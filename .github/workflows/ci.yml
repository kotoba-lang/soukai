name: ci

# soukai has NO :local/root deps (deliberately, ADR-2607121700 §6 — the
# NoticeTarget port ships mock-only in this version, no kotoba-lang/mailer,
# no HTTP client code) — so unlike koyomi's CI, no sibling-checkout steps are
# needed. langgraph/ed25519/ipns resolve via their pinned :git/sha directly
# (public kotoba-lang repos); langgraph's own :git/sha pin on
# io.github.kotoba-lang/langchain resolves transitively.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - run: clojure -M:lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - name: test (resolution-governor contract · tally math · store parity · CACAO crypto)
        run: clojure -M:dev:test
